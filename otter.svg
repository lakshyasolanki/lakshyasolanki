<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <defs>
    <radialGradient id="water" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="fur" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#5C4033"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#C4A87C"/>
      <stop offset="100%" stop-color="#9E8C6C"/>
    </radialGradient>
    <radialGradient id="nose" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(6px); }
    }
    @keyframes wave-left {
      0%, 40%, 100% { transform: rotate(0deg); }
      10%, 30% { transform: rotate(-15deg); }
      20% { transform: rotate(-25deg); }
    }
    @keyframes wave-right {
      0%, 100% { transform: rotate(0deg); }
      50%, 70% { transform: rotate(10deg); }
      60% { transform: rotate(20deg); }
    }
    @keyframes blink {
      0%, 42%, 46%, 100% { transform: scaleY(1); }
      44% { transform: scaleY(0.1); }
    }
    @keyframes ripple1 {
      0%, 100% { transform: translateX(0) scaleX(1); opacity: 0.5; }
      50% { transform: translateX(8px) scaleX(1.05); opacity: 0.3; }
    }
    @keyframes ripple2 {
      0%, 100% { transform: translateX(0) scaleX(1); opacity: 0.4; }
      50% { transform: translateX(-6px) scaleX(0.95); opacity: 0.6; }
    }
    @keyframes whisker-twitch {
      0%, 80%, 100% { transform: rotate(0deg); }
      85%, 95% { transform: rotate(3deg); }
      90% { transform: rotate(-3deg); }
    }
    .otter-body { animation: bob 3s ease-in-out infinite; }
    .left-paw { animation: wave-left 4s ease-in-out infinite; transform-origin: 145px 175px; }
    .right-paw { animation: wave-right 5s ease-in-out infinite 1s; transform-origin: 255px 175px; }
    .eyes { animation: blink 5s ease-in-out infinite; transform-origin: 200px 110px; }
    .ripple-1 { animation: ripple1 3s ease-in-out infinite; }
    .ripple-2 { animation: ripple2 3.5s ease-in-out infinite 0.5s; }
    .whiskers-left { animation: whisker-twitch 4s ease-in-out infinite; transform-origin: 185px 138px; }
    .whiskers-right { animation: whisker-twitch 4s ease-in-out infinite 0.3s; transform-origin: 215px 138px; }
  </style>

  <!-- Background water -->
  <rect width="400" height="350" fill="url(#water)" rx="16"/>

  <!-- Water ripples behind otter -->
  <g class="ripple-1">
    <ellipse cx="200" cy="230" rx="130" ry="8" fill="none" stroke="#2E86C1" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="200" cy="248" rx="150" ry="10" fill="none" stroke="#2E86C1" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Otter body group -->
  <g class="otter-body">

    <!-- Body (partially submerged) -->
    <ellipse cx="200" cy="225" rx="75" ry="45" fill="url(#fur)" opacity="0.7"/>

    <!-- Belly visible above water -->
    <ellipse cx="200" cy="200" rx="50" ry="30" fill="#C4A87C" opacity="0.5"/>

    <!-- Head -->
    <ellipse cx="200" cy="110" rx="62" ry="55" fill="url(#fur)"/>

    <!-- Ears -->
    <ellipse cx="152" cy="78" rx="12" ry="10" fill="#5C4033"/>
    <ellipse cx="152" cy="78" rx="7" ry="6" fill="#8B7355"/>
    <ellipse cx="248" cy="78" rx="12" ry="10" fill="#5C4033"/>
    <ellipse cx="248" cy="78" rx="7" ry="6" fill="#8B7355"/>

    <!-- Face (lighter area) -->
    <ellipse cx="200" cy="118" rx="42" ry="38" fill="url(#face)"/>

    <!-- Eyes -->
    <g class="eyes">
      <ellipse cx="182" cy="107" rx="7" ry="8" fill="#111"/>
      <ellipse cx="218" cy="107" rx="7" ry="8" fill="#111"/>
      <circle cx="184" cy="104" r="2.5" fill="#fff" opacity="0.8"/>
      <circle cx="220" cy="104" r="2.5" fill="#fff" opacity="0.8"/>
    </g>

    <!-- Nose -->
    <ellipse cx="200" cy="124" rx="9" ry="6" fill="url(#nose)"/>
    <ellipse cx="200" cy="122" rx="4" ry="2" fill="#444" opacity="0.5"/>

    <!-- Mouth -->
    <path d="M193 131 Q200 137 207 131" fill="none" stroke="#5C4033" stroke-width="1.5"/>

    <!-- Whiskers left -->
    <g class="whiskers-left">
      <line x1="170" y1="125" x2="145" y2="120" stroke="#D4C5A9" stroke-width="0.8" opacity="0.6"/>
      <line x1="170" y1="130" x2="143" y2="130" stroke="#D4C5A9" stroke-width="0.8" opacity="0.6"/>
      <line x1="170" y1="135" x2="145" y2="140" stroke="#D4C5A9" stroke-width="0.8" opacity="0.6"/>
    </g>

    <!-- Whiskers right -->
    <g class="whiskers-right">
      <line x1="230" y1="125" x2="255" y2="120" stroke="#D4C5A9" stroke-width="0.8" opacity="0.6"/>
      <line x1="230" y1="130" x2="257" y2="130" stroke="#D4C5A9" stroke-width="0.8" opacity="0.6"/>
      <line x1="230" y1="135" x2="255" y2="140" stroke="#D4C5A9" stroke-width="0.8" opacity="0.6"/>
    </g>

    <!-- Cheek fluff -->
    <ellipse cx="160" cy="125" rx="15" ry="12" fill="#A89070" opacity="0.5"/>
    <ellipse cx="240" cy="125" rx="15" ry="12" fill="#A89070" opacity="0.5"/>

    <!-- Left paw (near face, like the photo) -->
    <g class="left-paw">
      <ellipse cx="162" cy="165" rx="18" ry="14" fill="#5C4033"/>
      <ellipse cx="162" cy="168" rx="12" ry="9" fill="#8B7355"/>
      <!-- Paw pads -->
      <circle cx="155" cy="163" r="3" fill="#3D2B1F" opacity="0.6"/>
      <circle cx="162" cy="160" r="3" fill="#3D2B1F" opacity="0.6"/>
      <circle cx="169" cy="163" r="3" fill="#3D2B1F" opacity="0.6"/>
      <ellipse cx="162" cy="170" rx="5" ry="4" fill="#3D2B1F" opacity="0.5"/>
    </g>

    <!-- Right paw (near face, like the photo) -->
    <g class="right-paw">
      <ellipse cx="238" cy="165" rx="18" ry="14" fill="#5C4033"/>
      <ellipse cx="238" cy="168" rx="12" ry="9" fill="#8B7355"/>
      <!-- Paw pads -->
      <circle cx="231" cy="163" r="3" fill="#3D2B1F" opacity="0.6"/>
      <circle cx="238" cy="160" r="3" fill="#3D2B1F" opacity="0.6"/>
      <circle cx="245" cy="163" r="3" fill="#3D2B1F" opacity="0.6"/>
      <ellipse cx="238" cy="170" rx="5" ry="4" fill="#3D2B1F" opacity="0.5"/>
    </g>

  </g>

  <!-- Water surface (in front of otter) -->
  <g class="ripple-2">
    <path d="M30 225 Q65 218, 100 225 T170 225 T240 225 T310 225 T370 225" fill="none" stroke="#3498DB" stroke-width="2" opacity="0.4"/>
    <path d="M20 240 Q55 233, 90 240 T160 240 T230 240 T300 240 T380 240" fill="none" stroke="#2E86C1" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Water drops from paws -->
  <g class="otter-body">
    <circle cx="155" cy="182" r="1.5" fill="#5DADE2" opacity="0.6">
      <animate attributeName="cy" values="182;220;220" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.6;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="182" r="1.5" fill="#5DADE2" opacity="0.6">
      <animate attributeName="cy" values="182;218;218" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.6;0" dur="2.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Subtle water shimmer overlay -->
  <rect width="400" height="120" y="230" fill="#0d1117" opacity="0.3" rx="0"/>
  <path d="M0 260 Q50 253, 100 260 T200 260 T300 260 T400 260 V350 H0 Z" fill="#0d1117" opacity="0.4"/>

  <!-- Bottom water ripples -->
  <g class="ripple-1">
    <path d="M10 270 Q50 264, 90 270 T170 270 T250 270 T330 270 T400 270" fill="none" stroke="#2471A3" stroke-width="1" opacity="0.3"/>
    <path d="M0 290 Q40 284, 80 290 T160 290 T240 290 T320 290 T400 290" fill="none" stroke="#1B4F72" stroke-width="1" opacity="0.2"/>
    <path d="M20 310 Q60 304, 100 310 T180 310 T260 310 T340 310 T400 310" fill="none" stroke="#1B4F72" stroke-width="0.8" opacity="0.15"/>
  </g>
</svg>
